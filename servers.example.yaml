---
rdsserver1:
  host: "rdsserver1.example.com"
  port: 3306
  user: "reconciler"
  password: "password"
  ssl:
    ca: "/path/to/ca.pem"
    cert: "/path/to/cert.pem"
    key: "/path/to/key.pem"
  iam_auth: false
rdsserver1-sham:
  host: "rdsserver1-sham.example.com"
  port: 3306
  user: "reconciler"
  aws_region: "us-east-1"
  iam_auth: true
rdsserver2:
  aws_region: "us-east-1"
  aws_id: "rdsserver2"
  user: "reconciler"
  iam_auth: true
otherserver:
  host: "otherserver.example.com"
  port: 3306
  user: "reconciler"
  password: "password"
  enabled: false
